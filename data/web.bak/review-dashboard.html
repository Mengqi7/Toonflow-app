<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toonflow — 审查 Dashboard</title>
<style>
  :root { --bg: #1a1a2e; --panel: #16213e; --accent: #0f3460; --text: #e0e0e0; --green: #2ecc71; --red: #e74c3c; --yellow: #f39c12; --blue: #3498db; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; }
  .sidebar-header { padding: 20px; border-bottom: 1px solid #2a2a4a; font-size: 18px; font-weight: 700; color: var(--blue); }
  .sidebar-header small { display: block; font-size: 11px; color: #888; font-weight: 400; }
  .workflow-tree { flex: 1; overflow-y: auto; padding: 12px; }
  .stage-group { margin-bottom: 8px; }
  .stage-label { font-size: 11px; text-transform: uppercase; color: #666; padding: 8px 4px 4px; letter-spacing: 1px; }
  .stage-node { display: flex; align-items: center; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .15s; margin-bottom: 2px; }
  .stage-node:hover { background: var(--accent); }
  .stage-node .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .dot.pending { background: #555; } .dot.running { background: var(--blue); animation: pulse 1s infinite; }
  .dot.completed { background: var(--green); } .dot.failed { background: var(--red); } .dot.reviewing { background: var(--yellow); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .main { flex: 1; display: flex; flex-direction: column; }
  .toolbar { padding: 16px 24px; background: var(--panel); border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 16px; }
  .toolbar h1 { font-size: 20px; flex: 1; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s; }
  .btn-approve { background: var(--green); color: #fff; }
  .btn-reject { background: var(--red); color: #fff; }
  .btn-skip { background: #555; color: #ccc; }
  .btn:hover { filter: brightness(1.2); }
  .content { flex: 1; display: flex; overflow: hidden; }
  .preview-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #111; position: relative; }
  .preview-area img { max-width: 90%; max-height: 90%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
  .preview-area .placeholder { color: #444; font-size: 48px; }
  .right-panel { width: 320px; background: var(--panel); border-left: 1px solid #2a2a4a; overflow-y: auto; padding: 20px; }
  .score-card { margin-bottom: 20px; }
  .score-card h3 { font-size: 14px; margin-bottom: 8px; color: #aaa; }
  .score-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
  .score-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .score-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
  .status-bar { padding: 12px; background: var(--bg); border-radius: 6px; text-align: center; }
  .overall-score { font-size: 36px; font-weight: 700; }
  .overall-label { font-size: 11px; color: #888; }
  .log-area { margin-top: 16px; }
  .log-area h3 { font-size: 14px; margin-bottom: 8px; color: #aaa; }
  .log-entry { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #1a1a2e; color: #888; }
  .log-entry .time { color: #555; margin-right: 8px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">Toonflow 审查面板<small>Harness DAG Monitor</small></div>
  <div class="workflow-tree" id="workflowTree"></div>
</div>
<div class="main">
  <div class="toolbar">
    <h1 id="currentShot">Shot #1 / 12 — 中景·主角登场</h1>
    <div style="display:flex;gap:8px">
      <button class="btn btn-approve" onclick="approve()">✓ 通过</button>
      <button class="btn btn-reject" onclick="reject()">✗ 打回</button>
      <button class="btn btn-skip" onclick="skip()">→ 跳过</button>
    </div>
  </div>
  <div class="content">
    <div class="preview-area" id="preview">
      <div class="placeholder">🎬</div>
    </div>
    <div class="right-panel">
      <div class="score-card">
        <h3>技术质量</h3>
        <div class="score-row"><span>分辨率</span><span id="s-resolution">0.95</span></div><div class="score-bar"><div class="score-fill" style="width:95%;background:var(--green)"></div></div>
        <div class="score-row"><span>AI 瑕疵</span><span id="s-artifacts">0.85</span></div><div class="score-bar"><div class="score-fill" style="width:85%;background:var(--yellow)"></div></div>
        <div class="score-row"><span>色彩空间</span><span id="s-color">0.90</span></div><div class="score-bar"><div class="score-fill" style="width:90%;background:var(--green)"></div></div>
      </div>
      <div class="score-card">
        <h3>艺术质量</h3>
        <div class="score-row"><span>构图</span><span id="s-composition">0.78</span></div><div class="score-bar"><div class="score-fill" style="width:78%;background:var(--yellow)"></div></div>
        <div class="score-row"><span>风格匹配</span><span id="s-style">0.82</span></div><div class="score-bar"><div class="score-fill" style="width:82%;background:var(--green)"></div></div>
        <div class="score-row"><span>光影</span><span id="s-lighting">0.75</span></div><div class="score-bar"><div class="score-fill" style="width:75%;background:var(--yellow)"></div></div>
      </div>
      <div class="score-card">
        <h3>内容匹配</h3>
        <div class="score-row"><span>场景匹配</span><span id="s-scene">0.88</span></div><div class="score-bar"><div class="score-fill" style="width:88%;background:var(--green)"></div></div>
        <div class="score-row"><span>角色一致性</span><span id="s-character">0.90</span></div><div class="score-bar"><div class="score-fill" style="width:90%;background:var(--green)"></div></div>
      </div>
      <div class="status-bar">
        <div class="overall-score" id="overallScore">0.84</div>
        <div class="overall-label">综合评分</div>
      </div>
      <div class="log-area">
        <h3>操作日志</h3>
        <div id="logEntries">
          <div class="log-entry"><span class="time">23:00:01</span>DP Agent 生成 Shot #1</div>
          <div class="log-entry"><span class="time">23:00:05</span>审核通过 (0.84)</div>
          <div class="log-entry"><span class="time">23:00:08</span>DP Agent 生成 Shot #2</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 工作流 DAG 数据 ──────────────────────────
const workflowStages = [
  { label: '阶段1: 剧本创作', nodes: [
    { id:'screenwriter.analyze', name:'编剧·分析', state:'completed' },
    { id:'screenwriter.adapt', name:'编剧·改编策略', state:'completed' },
    { id:'screenwriter.generate', name:'编剧·剧本生成', state:'completed' },
    { id:'review.script', name:'审核·剧本', state:'completed' },
  ]},
  { label: '阶段2: 视觉风格', nodes: [
    { id:'director.style', name:'导演·风格推理', state:'completed' },
    { id:'review.style', name:'审核·风格', state:'completed' },
    { id:'director.storyboard', name:'导演·分镜规划', state:'completed' },
  ]},
  { label: '阶段3: 画面生成', nodes: [
    { id:'generate.shot.1', name:'DP·Shot #1', state:'reviewing' },
    { id:'generate.shot.2', name:'DP·Shot #2', state:'completed' },
    { id:'generate.shot.3', name:'DP·Shot #3', state:'running' },
    { id:'generate.shot.4', name:'DP·Shot #4', state:'pending' },
    { id:'generate.shots.join', name:'聚合·画面', state:'pending' },
  ]},
  { label: '阶段4: 剪辑·音频', nodes: [
    { id:'editor.assemble', name:'剪辑·组接', state:'pending' },
    { id:'sound.design', name:'音频·设计', state:'pending' },
  ]},
  { label: '阶段5: 视频生成', nodes: [
    { id:'generate.videos', name:'视频·生成', state:'pending' },
    { id:'final.assemble', name:'终剪·输出', state:'pending' },
  ]},
];

function renderWorkflow() {
  const tree = document.getElementById('workflowTree');
  tree.innerHTML = workflowStages.map(s => 
    '<div class="stage-group"><div class="stage-label">' + s.label + '</div>' +
    s.nodes.map(n => 
      '<div class="stage-node" onclick="selectNode(''+n.id+'')"><span class="dot '+n.state+'"></span>'+n.name+'</div>'
    ).join('') + '</div>'
  ).join('');
}

// ── 审核操作 ──────────────────────────────────
let currentShot = 1;
function approve() { addLog('用户通过 Shot #'+currentShot); currentShot++; updateUI(); }
function reject() { addLog('用户打回 Shot #'+currentShot+' — 需修改构图'); currentShot++; updateUI(); }
function skip() { addLog('用户跳过 Shot #'+currentShot); currentShot++; updateUI(); }
function selectNode(id) { console.log('Selected:', id); }

function addLog(msg) {
  const now = new Date().toTimeString().slice(0,8);
  const el = document.getElementById('logEntries');
  el.innerHTML += '<div class="log-entry"><span class="time">'+now+'</span>'+msg+'</div>';
  el.scrollTop = el.scrollHeight;
}

function updateUI() {
  const total = 12;
  document.getElementById('currentShot').textContent = 'Shot #'+Math.min(currentShot,total)+' / '+total+' — '+(currentShot>total?'ALL DONE':'审核中');
  // Mock: randomize scores slightly
  ['resolution','artifacts','color','composition','style','lighting','scene','character'].forEach(id => {
    const el = document.getElementById('s-'+id);
    if (el) el.textContent = (0.7 + Math.random()*0.28).toFixed(2);
  });
  document.getElementById('overallScore').textContent = (0.7 + Math.random()*0.28).toFixed(2);
}

// ── Server health check ──────────────────────
async function checkServer() {
  try { const r = await fetch('/api/setting/about/checkUpdate'); addLog('服务器连接: OK'); } catch(e) { addLog('服务器连接: 未运行'); }
}
setTimeout(checkServer, 1000);
renderWorkflow();
</script>
</body>
</html>
